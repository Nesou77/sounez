# Render deployment configuration — sounez-backend
#
# Repo root:  sounez/
# This file:  sounez/backend/render.yaml  (kept for reference — Render reads the root render.yaml)
#
# Why Docker?
# Render's native Node runtime only deploys project files; apt-installed packages like
# LibreOffice are discarded after the build step and unavailable at runtime.
# Using runtime: docker bakes LibreOffice into the image so it is always present.

services:
  - type: web
    name: sounez-backend
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "https://www.sounez.com,https://sounez.com"
      - key: MAX_FILE_SIZE_MB
        value: 20
