# Render deployment configuration — sounez-backend
#
# Repo root:  sounez/
# This file:  sounez/backend/render.yaml
# rootDir:    backend   (relative to repo root)
#
# Setup:
#   1. In Render dashboard → New Web Service → connect GitHub repo (sounez)
#   2. Set Root Directory to "backend"
#   3. Render will use the build/start commands below
#   4. Add ALLOWED_ORIGINS env var in the dashboard

services:
  - type: web
    name: sounez-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libreoffice && npm install && npm run build"
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "https://www.sounez.com,https://sounez.com"
      - key: MAX_FILE_SIZE_MB
        value: 20
