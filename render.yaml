# Render Blueprint — sounez-backend
#
# This file must be at the repo root for Render to detect it automatically.
# Repo: https://github.com/Nesou77/sounez
# Backend source: /backend subfolder

services:
  - type: web
    name: sounez-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "https://www.sounez.com,https://sounez.com"
      - key: MAX_FILE_SIZE_MB
        value: 20
