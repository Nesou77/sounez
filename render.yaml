# Render Blueprint — sounez-backend
#
# This file must be at the repo root for Render to detect it automatically.
# Repo: https://github.com/Nesou77/sounez
# Backend source: /backend subfolder
#
# Why Docker instead of native Node runtime?
# Render's native runtime only deploys project files to the runtime container.
# System packages installed with apt-get during buildCommand are discarded after build.
# A Docker service bakes LibreOffice into the image, so it is available at runtime.

services:
  - type: web
    name: sounez-backend
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: "https://www.sounez.com,https://sounez.com"
      - key: MAX_FILE_SIZE_MB
        value: 20
